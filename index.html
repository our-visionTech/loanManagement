<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Village Loan Book Pro</title>

<style>
:root{
    --primary:#1b5e20;
    --accent:#43a047;
    --danger:#d32f2f;
}

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#dfe9f3,#ffffff);
}

/* BOOK */
.book{
    max-width:1000px;
    margin:auto;
    padding:15px;
}

/* PAGE */
.page{
    display:none;
    background:white;
    min-height:90vh;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.active{
    display:block;
}

h2{
    text-align:center;
    color:var(--primary);
}

/* 🔥 HOME GRID (2 COLUMNS FIXED) */
.home-grid{
    display:grid;
    grid-template-columns:1fr 1fr;   /* 👈 TWO COLUMNS */
    gap:15px;
    margin-top:40px;
    max-width:700px;
    margin-left:auto;
    margin-right:auto;
}

/* BIG BUTTONS */
.home-btn{
    padding:25px;
    font-size:18px;
    font-weight:bold;
    border:none;
    border-radius:14px;
    cursor:pointer;
    background:var(--accent);
    color:white;
    box-shadow:0 6px 15px rgba(0,0,0,0.15);
    transition:0.2s;
}

.home-btn:hover{
    transform:scale(1.03);
    background:#2e7d32;
}

/* NAV */
.nav{
    background:#ddd;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:15px;
    width:100%;
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* CARDS */
.card{
    background:#fff;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    border-left:6px solid var(--accent);
}

.overdue{
    border-left-color:var(--danger);
}

.small{
    font-size:12px;
    color:gray;
}

/* 📱 MOBILE RESPONSIVE */
@media(max-width:700px){
.home-grid{
    grid-template-columns:1fr;   /* single column on phone */
}
}
</style>
</head>

<body>

<div class="book">

<!-- HOME -->
<div id="home" class="page active">
<h2>🏠 Loan Book System</h2>

<div class="home-grid">
<button class="home-btn" onclick="openPage('add')">➕ Add Loan</button>
<button class="home-btn" onclick="openPage('loans')">📌 Active Loans</button>
<button class="home-btn" onclick="openPage('reports')">📊 Reports</button>
<button class="home-btn" onclick="resetData()">♻ Reset Data</button>
</div>

</div>

<!-- ADD -->
<div id="add" class="page">
<h2>Add Loan</h2>

<input id="name" placeholder="Borrower Name">
<input id="phone" placeholder="Phone Number">
<input id="amount" type="number" placeholder="Loan Amount">
<input id="rate" type="number" value="10" placeholder="Interest %">
<input id="due" type="date">

<button class="home-btn" style="width:100%;margin-top:15px;" onclick="addLoan()">Save Loan</button>
<button class="nav" onclick="openPage('home')">⬅ Back Home</button>
</div>

<!-- LOANS -->
<div id="loans" class="page">
<h2>Active Loans</h2>

<input id="search" oninput="render()" placeholder="Search borrower...">

<div id="list"></div>

<button class="nav" onclick="openPage('home')">⬅ Back Home</button>
</div>

<!-- REPORTS -->
<div id="reports" class="page">
<h2>Reports</h2>

<div class="card" id="reportBox"></div>

<button class="nav" onclick="openPage('home')">⬅ Back Home</button>
</div>

</div>

<script>

let loans = JSON.parse(localStorage.getItem("loans") || "[]");
let done = JSON.parse(localStorage.getItem("done") || "[]");

function save(){
localStorage.setItem("loans", JSON.stringify(loans));
localStorage.setItem("done", JSON.stringify(done));
render();
}

function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
render();
}

function money(v){
return "R " + Number(v || 0).toFixed(2);
}

function addLoan(){

let nameVal = document.getElementById("name").value.trim();
let phoneVal = document.getElementById("phone").value.trim();
let amountVal = parseFloat(document.getElementById("amount").value);
let rateVal = parseFloat(document.getElementById("rate").value);
let dueVal = document.getElementById("due").value;

if(!nameVal || !phoneVal || !amountVal || !dueVal){
alert("Please fill all fields");
return;
}

let loan = {
id: Date.now(),
name: nameVal,
phone: phoneVal,
amount: amountVal,
rate: rateVal || 0,
due: dueVal,
paid: 0,
history: []
};

loan.total = loan.amount + (loan.amount * loan.rate / 100);

loans.push(loan);
save();

openPage("loans");
}

function pay(id){

let loan = loans.find(l=>l.id === id);
let amt = parseFloat(prompt("Enter payment amount"));

if(!loan || isNaN(amt)) return;

if(amt > loan.total - loan.paid){
alert("Overpayment not allowed");
return;
}

loan.paid += amt;

loan.history.push({
amt: amt,
date: new Date().toLocaleDateString()
});

if(loan.paid >= loan.total){
done.push(loan);
loans = loans.filter(l=>l.id !== id);
}

save();
}

function del(id){
loans = loans.filter(l=>l.id !== id);
save();
}

function resetData(){
if(confirm("Delete all data?")){
loans = [];
done = [];
save();
}
}

function render(){

let q = (document.getElementById("search")?.value || "").toLowerCase();

let list = document.getElementById("list");
if(list) list.innerHTML = "";

let today = new Date().toISOString().split("T")[0];

loans
.filter(l =>
(l.name || "").toLowerCase().includes(q) ||
(l.phone || "").includes(q)
)
.forEach(l=>{

let owed = (l.total || 0) - (l.paid || 0);
let overdue = today > l.due;

list.innerHTML += `
<div class="card ${overdue ? 'overdue' : ''}">
<b>${l.name}</b><br>
${l.phone}<br><br>

Loan: ${money(l.amount)}<br>
Total: ${money(l.total)}<br>
Paid: ${money(l.paid)}<br>
Owes: ${money(owed)}<br>
Due: ${l.due}<br><br>

<button class="home-btn" style="width:100%;padding:10px;font-size:14px;" onclick="pay(${l.id})">Pay</button>
<button class="home-btn" style="width:100%;padding:10px;font-size:14px;background:#d32f2f;" onclick="del(${l.id})">Delete</button>

<div class="small">
${(l.history || []).map(h =>
`• ${money(h.amt)} on ${h.date}`
).join("<br>")}
</div>
</div>
`;
});

let report = document.getElementById("reportBox");
if(report){
let total = loans.reduce((a,b)=>a+(b.total||0),0);
let paid = loans.reduce((a,b)=>a+(b.paid||0),0);

report.innerHTML = `
<b>Total Loans:</b> ${loans.length}<br>
<b>Total Issued:</b> ${money(total)}<br>
<b>Total Paid:</b> ${money(paid)}<br>
<b>Outstanding:</b> ${money(total - paid)}
`;
}

}

render();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Village Loan Book Pro</title>

<style>
:root{
    --primary:#1b5e20;
    --accent:#43a047;
    --danger:#d32f2f;
    --bg:#e9ecef;
}

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#dfe9f3,#ffffff);
}

/* BOOK */
.book{
    max-width:1000px;
    margin:auto;
    padding:10px;
}

/* PAGE */
.page{
    display:none;
    background:white;
    min-height:90vh;
    padding:20px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.active{
    display:block;
}

/* HOME GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:20px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    font-size:15px;
}

.btn{background:var(--accent);color:white;}
.btn-danger{background:var(--danger);color:white;}
.nav{background:#ddd;}

input{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:8px;
    border:1px solid #ccc;
}

.card{
    background:#fff;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    border-left:6px solid var(--accent);
}

.overdue{
    border-left-color:var(--danger);
}

.small{
    font-size:12px;
    color:gray;
}

h2{
    text-align:center;
    color:var(--primary);
}
</style>
</head>

<body>

<div class="book">

<!-- HOME -->
<div id="home" class="page active">
<h2>🏠 Loan Book System</h2>

<div class="grid">
<button class="btn" onclick="openPage('add')">➕ Add Loan</button>
<button class="btn" onclick="openPage('loans')">📌 Active Loans</button>
<button class="btn" onclick="openPage('reports')">📊 Reports</button>
<button class="nav" onclick="resetData()">♻ Reset</button>
</div>
</div>

<!-- ADD -->
<div id="add" class="page">
<h2>Add Loan</h2>

<input id="name" placeholder="Borrower Name">
<input id="phone" placeholder="Phone Number">
<input id="amount" type="number" placeholder="Loan Amount">
<input id="rate" type="number" value="10" placeholder="Interest %">
<input id="due" type="date">

<button class="btn" onclick="addLoan()">Save Loan</button>
<button class="nav" onclick="openPage('home')">⬅ Back</button>
</div>

<!-- LOANS -->
<div id="loans" class="page">
<h2>Active Loans</h2>

<input id="search" oninput="render()" placeholder="Search borrower...">

<div id="list"></div>

<button class="nav" onclick="openPage('home')">⬅ Back</button>
</div>

<!-- REPORTS -->
<div id="reports" class="page">
<h2>Reports</h2>

<div class="card" id="reportBox"></div>

<button class="nav" onclick="openPage('home')">⬅ Back</button>
</div>

</div>

<script>

/* SAFE STORAGE */
let loans = JSON.parse(localStorage.getItem("loans") || "[]");
let done = JSON.parse(localStorage.getItem("done") || "[]");

/* SAVE */
function save(){
localStorage.setItem("loans", JSON.stringify(loans));
localStorage.setItem("done", JSON.stringify(done));
render();
}

/* PAGE SWITCH */
function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
render();
}

/* MONEY FORMAT */
function money(v){
return "R " + Number(v || 0).toFixed(2);
}

/* ADD LOAN (FIXED) */
function addLoan(){

let nameVal = document.getElementById("name").value.trim();
let phoneVal = document.getElementById("phone").value.trim();
let amountVal = parseFloat(document.getElementById("amount").value);
let rateVal = parseFloat(document.getElementById("rate").value);
let dueVal = document.getElementById("due").value;

if(!nameVal || !phoneVal || !amountVal || !dueVal){
alert("Please fill all fields");
return;
}

let loan = {
id: Date.now(),
name: nameVal,
phone: phoneVal,
amount: amountVal,
rate: rateVal || 0,
due: dueVal,
paid: 0,
history: []
};

loan.total = loan.amount + (loan.amount * loan.rate / 100);

loans.push(loan);
save();

openPage("loans");
}

/* PAY */
function pay(id){

let loan = loans.find(l=>l.id === id);
if(!loan) return;

let amt = parseFloat(prompt("Enter payment amount"));

if(isNaN(amt) || amt <= 0){
alert("Invalid amount");
return;
}

if(amt > loan.total - loan.paid){
alert("Overpayment not allowed");
return;
}

loan.paid += amt;

if(!loan.history) loan.history = [];

loan.history.push({
amt: amt,
date: new Date().toLocaleDateString()
});

if(loan.paid >= loan.total){
done.push(loan);
loans = loans.filter(l=>l.id !== id);
}

save();
}

/* DELETE */
function del(id){
loans = loans.filter(l=>l.id !== id);
save();
}

/* RESET */
function resetData(){
if(confirm("Delete all data?")){
loans = [];
done = [];
save();
}
}

/* RENDER */
function render(){

let q = (document.getElementById("search")?.value || "").toLowerCase();

let list = document.getElementById("list");
let report = document.getElementById("reportBox");

if(list) list.innerHTML = "";

/* LOANS */
loans
.filter(l =>
(l.name || "").toLowerCase().includes(q) ||
(l.phone || "").includes(q)
)
.forEach(l=>{

let owed = (l.total || 0) - (l.paid || 0);
let overdue = new Date().toISOString().split("T")[0] > l.due;

list.innerHTML += `
<div class="card ${overdue ? 'overdue' : ''}">
<b>${l.name || ''}</b><br>
${l.phone || ''}<br><br>

Loan: ${money(l.amount)}<br>
Total: ${money(l.total)}<br>
Paid: ${money(l.paid)}<br>
Owes: ${money(owed)}<br>
Due: ${l.due}<br><br>

<button class="btn" onclick="pay(${l.id})">Pay</button>
<button class="btn-danger" onclick="del(${l.id})">Delete</button>

<div class="small">
${(l.history || []).map(h =>
`• ${money(h.amt)} on ${h.date}`
).join("<br>")}
</div>
</div>
`;
});

/* REPORTS */
if(report){
let total = loans.reduce((a,b)=>a+(b.total||0),0);
let paid = loans.reduce((a,b)=>a+(b.paid||0),0);

report.innerHTML = `
<b>Total Loans:</b> ${loans.length}<br>
<b>Total Issued:</b> ${money(total)}<br>
<b>Total Paid:</b> ${money(paid)}<br>
<b>Outstanding:</b> ${money(total - paid)}
`;
}

}

/* INIT */
render();

</script>

</body>
</html>

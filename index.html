<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Village Loan Pro</title>

<style>
:root{
    --primary:#1b5e20;
    --accent:#43a047;
    --danger:#d32f2f;
    --bg:#f2f2f2;
    --card:#ffffff;
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
}

/* HEADER */
header{
    background:var(--primary);
    color:white;
    text-align:center;
    padding:15px;
}

/* PAGES */
.page{
    display:none;
    padding:15px;
}

.active{
    display:block;
}

/* CARD */
.card{
    background:var(--card);
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* BUTTONS */
button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.btn{
    background:var(--accent);
    color:white;
}

.btn-danger{
    background:var(--danger);
    color:white;
}

.nav{
    background:#ddd;
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    margin-top:6px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* LOAN CARD */
.loan{
    border-left:5px solid var(--accent);
}

.overdue{
    border-left-color:var(--danger);
}

/* SMALL TEXT */
.small{
    font-size:12px;
    color:gray;
}
</style>
</head>

<body>

<header>
<h2>🏦 Village Loan Pro</h2>
</header>

<!-- HOME -->
<div id="home" class="page active">
<div class="card">
<h3>Dashboard</h3>

<button class="btn" onclick="openPage('add')">➕ Add Loan</button>
<button class="btn" onclick="openPage('loans')">📌 Active Loans</button>
<button class="btn" onclick="openPage('reports')">📊 Reports</button>
</div>
</div>

<!-- ADD LOAN -->
<div id="add" class="page">

<div class="card">
<h3>Add New Loan</h3>

<input id="name" placeholder="Borrower Name">
<input id="phone" placeholder="Phone Number">
<input id="amount" type="number" placeholder="Loan Amount">
<input id="rate" type="number" value="10" placeholder="Interest %">
<input id="due" type="date">

<button class="btn" onclick="addLoan()">Save Loan</button>
<button class="nav" onclick="openPage('home')">Back Home</button>
</div>

</div>

<!-- LOANS -->
<div id="loans" class="page">

<div class="card">
<h3>Active Loans</h3>

<input id="search" oninput="renderLoans()" placeholder="Search borrower...">
</div>

<div id="loanList"></div>

<button class="nav" onclick="openPage('home')">Back Home</button>
</div>

<!-- REPORTS -->
<div id="reports" class="page">

<div class="card">
<h3>Reports</h3>

<div id="reportBox"></div>

<button class="nav" onclick="openPage('home')">Back Home</button>
</div>

</div>

<script>

let loans = JSON.parse(localStorage.getItem("loans") || "[]");
let completed = JSON.parse(localStorage.getItem("completed") || "[]");

function save(){
localStorage.setItem("loans", JSON.stringify(loans));
localStorage.setItem("completed", JSON.stringify(completed));
renderLoans();
renderReports();
}

/* PAGE NAVIGATION */
function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");

renderLoans();
renderReports();
}

/* FORMAT MONEY */
function money(v){
return "R " + Number(v).toFixed(2);
}

/* ADD LOAN */
function addLoan(){

let l = {
id: Date.now(),
name: name.value,
phone: phone.value,
amount: +amount.value,
rate: +rate.value,
due: due.value,
paid: 0,
history: []
};

l.total = l.amount + (l.amount * l.rate / 100);

loans.push(l);
save();

openPage("loans");
}

/* PAY LOAN */
function pay(id){

let loan = loans.find(l=>l.id===id);
if(!loan) return;

let amt = +prompt("Enter payment amount");

if(isNaN(amt) || amt <= 0){
alert("Invalid payment");
return;
}

if(amt > loan.total - loan.paid){
alert("You cannot overpay");
return;
}

loan.paid += amt;
loan.history.push({amt,date:new Date().toLocaleDateString()});

if(loan.paid >= loan.total){
completed.push(loan);
loans = loans.filter(l=>l.id !== id);
}

save();
}

/* DELETE */
function del(id){
loans = loans.filter(l=>l.id !== id);
save();
}

/* RENDER LOANS */
function renderLoans(){

let q = search?.value?.toLowerCase() || "";
let box = document.getElementById("loanList");
box.innerHTML = "";

let today = new Date().toISOString().split("T")[0];

loans
.filter(l=>l.name.toLowerCase().includes(q) || l.phone.includes(q))
.forEach(l=>{

let owed = l.total - l.paid;
let overdue = today > l.due;

box.innerHTML += `
<div class="card loan ${overdue?'overdue':''}">
<b>${l.name}</b><br>
${l.phone}<br><br>

Loan: ${money(l.amount)}<br>
Total: ${money(l.total)}<br>
Paid: ${money(l.paid)}<br>
Owes: ${money(owed)}<br>
Due: ${l.due}<br><br>

<button class="btn" onclick="pay(${l.id})">Record Payment</button>
<button class="btn-danger" onclick="del(${l.id})">Delete</button>

<div class="small">
${l.history.map(h=>`• ${money(h.amt)} on ${h.date}`).join("<br>")}
</div>
</div>
`;
});

}

/* REPORTS */
function renderReports(){

let totalLoans = loans.length;
let totalMoney = loans.reduce((a,b)=>a+b.total,0);
let totalPaid = loans.reduce((a,b)=>a+b.paid,0);

let box = document.getElementById("reportBox");

box.innerHTML = `
<p>Total Active Loans: ${totalLoans}</p>
<p>Total Loaned: ${money(totalMoney)}</p>
<p>Total Collected: ${money(totalPaid)}</p>
<p>Outstanding: ${money(totalMoney - totalPaid)}</p>
`;
}

/* INIT */
renderLoans();
renderReports();

</script>

</body>
</html>
